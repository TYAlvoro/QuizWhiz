<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Регистрация</title>
</head>
<body>
<h1>Регистрация</h1>
<!-- Форма регистрации с привязкой к объекту registrationRequest -->
<form th:action="@{/register}" th:object="${registrationRequest}" method="post">
  <div>
    <label for="username">Имя пользователя:</label>
    <input type="text" id="username" th:field="*{username}" />
    <!-- Отображение ошибок для поля username -->
    <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
  </div>
  <div>
    <label for="password">Пароль:</label>
    <input type="password" id="password" th:field="*{password}" />
    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
  </div>
  <div>
    <label for="email">Email:</label>
    <input type="email" id="email" th:field="*{email}" />
    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
  </div>
  <!-- Если роль всегда "USER", задаём скрыто -->
  <input type="hidden" th:field="*{role}" value="USER" />
  <button type="submit">Зарегистрироваться</button>
</form>

<!-- Отображение общей ошибки, если она присутствует -->
<div th:if="${error}">
  <p th:text="${error}" style="color:red;"></p>
</div>
</body>
</html>
