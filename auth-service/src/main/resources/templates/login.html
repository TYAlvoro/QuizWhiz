<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
<h1>Вход в систему</h1>
<form action="/login" method="post">
  <label>Имя пользователя:
    <input type="text" name="username" />
  </label><br/>
  <label>Пароль:
    <input type="password" name="password" />
  </label><br/>
  <button type="submit">Войти</button>
</form>
</body>
</html>
